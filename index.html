    body {

      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: Arial, sans-serif;

    }

    .card {
      width: 100%;
      max-width: 760px;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(14px);
      border-radius: 28px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.14);
    }

    }

    .subtitle {
      margin: 0 0 24px;
      color: #3a3a3a;
      font-size: 1rem;
      opacity: 0.95;
    }

    .message-box {
      position: relative;
      width: 100%;
      min-height: 240px;
      border-radius: 26px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.22);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15), 0 10px 25px rgba(0,0,0,0.08);
    }

    .message-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
      color: #222;
      font-size: 1.7rem;
      line-height: 1.5;
      font-weight: bold;
      user-select: none;
      z-index: 1;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      cursor: crosshair;
      border-radius: 26px;
    }

    .meta {
      margin-top: 18px;
      color: #333;
      font-size: 0.98rem;
      opacity: 0.95;
    }

    .note {
      display: none;
    }

    .revealed {
      margin-top: 22px;
      color: #2d2d2d;
      font-size: 1.08rem;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.35s ease;
    }

    .revealed.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 600px) {
      .card { padding: 22px 16px; }
      h1 { font-size: 1.7rem; }
      .message-text { font-size: 1.35rem; min-height: 220px; }

    const STORAGE_KEY = "sweetMessage365State_v1";
    const messageText = document.getElementById("messageText");

    const revealedText = document.getElementById("revealedText");
    const canvas = document.getElementById("scratchCanvas");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      const box = canvas.parentElement.getBoundingClientRect();
      canvas.width = box.width;
      canvas.height = box.height;
      drawCover();
    }

    function getTodayKey() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        const freshState = {
          order: shuffle(messages.map((_, i) => i)),
          pointer: 0,
          todayKey: null,
          currentIndex: null,
          revealedToday: false
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(freshState));
        return freshState;
      }
      return JSON.parse(raw);
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function ensureStateForToday() {
      let state = loadState();
      const todayKey = getTodayKey();

      if (!Array.isArray(state.order) || state.order.length !== messages.length) {
        state.order = shuffle(messages.map((_, i) => i));
        state.pointer = 0;
        state.todayKey = null;
        state.currentIndex = null;
        state.revealedToday = false;
      }

      if (state.pointer >= state.order.length) {
        state.order = shuffle(messages.map((_, i) => i));
        state.pointer = 0;
      }

      if (state.todayKey !== todayKey || state.currentIndex === null) {
        state.currentIndex = state.order[state.pointer];
        state.pointer += 1;
        state.todayKey = todayKey;
        state.revealedToday = false;

        if (state.pointer >= state.order.length) {
          // keeps current one for today, reshuffles remaining future cycle later
          state.order = shuffle(messages.map((_, i) => i));
          state.pointer = 0;
        }

        saveState(state);
      }

      return state;
    }

    function drawCover() {
      ctx.globalCompositeOperation = "source-over";
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      gradient.addColorStop(0, "#ff5c8a");
      gradient.addColorStop(1, "#ff8fb1");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < 80; i++) {
        ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.18})`;
        ctx.beginPath();
        ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 2.2 + 0.6, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = "rgba(255,255,255,0.96)";
      ctx.textAlign = "center";
      ctx.font = `bold ${Math.max(20, canvas.width * 0.038)}px Arial`;
      ctx.fillText("Scratch here babe", canvas.width / 2, canvas.height / 2);

}

    function markRevealedToday() {
      const state = loadState();
      state.revealedToday = true;
      saveState(state);
      revealedText.classList.add("show");
    }

    function scratchSetup() {
      let isDrawing = false;

      function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
          x: (clientX - rect.left) * (canvas.width / rect.width),
          y: (clientY - rect.top) * (canvas.height / rect.height)
        };
      }

      function scratch(x, y) {
        ctx.globalCompositeOperation = "destination-out";
        ctx.beginPath();
        ctx.arc(x, y, 24, 0, Math.PI * 2);
        ctx.fill();
        checkRevealAmount();
      }

      function start(e) {
        isDrawing = true;
        const pos = getPos(e);
        scratch(pos.x, pos.y);
        if (e.cancelable) e.preventDefault();
      }

      function move(e) {
        if (!isDrawing) return;
        const pos = getPos(e);
        scratch(pos.x, pos.y);
        if (e.cancelable) e.preventDefault();
      }

      function end() {
        isDrawing = false;
      }

      canvas.onmousedown = start;
      canvas.onmousemove = move;
      canvas.onmouseup = end;
      canvas.onmouseleave = end;
      canvas.ontouchstart = start;
      canvas.ontouchmove = move;
      canvas.ontouchend = end;
    }

    function checkRevealAmount() {
      const state = loadState();
      if (state.revealedToday) return;

      const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      let transparent = 0;

      for (let i = 3; i < pixels.length; i += 4) {
        if (pixels[i] === 0) transparent++;
      }

      const percent = transparent / (canvas.width * canvas.height);
      if (percent > 0.42) {
        canvas.style.opacity = "0";
        canvas.style.pointerEvents = "none";
        markRevealedToday();
      }
    }

    function init() {
      const state = ensureStateForToday();
      const msg = messages[state.currentIndex];
      messageText.textContent = msg;
      dayInfo.textContent = `Today’s love note: ${state.todayKey}`;
      revealedText.classList.toggle("show", !!state.revealedToday);

      canvas.style.opacity = state.revealedToday ? "0" : "1";
      canvas.style.pointerEvents = state.revealedToday ? "none" : "auto";

      resizeCanvas();
      if (state.revealedToday) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    }

    window.addEventListener("resize", () => {
      const state = loadState();
      resizeCanvas();
      if (state.revealedToday) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        canvas.style.opacity = "0";
      }
    });

    scratchSetup();
    init();
